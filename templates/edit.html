{% extends "layout.html" %}
{% block title %}Edit List - Food Planner{% endblock %}
{% block content %}
<div class="space-y-6">
    <!-- Buying List -->
    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-md p-6">
        <h2 class="text-xl font-bold text-slate-800 dark:text-white mb-4">🛒 Items to Buy</h2>
        <div id="buyingList" class="space-y-2">
            {% for item in buying %}
            <div class="list-item flex items-center gap-2 bg-slate-50 dark:bg-slate-700 rounded-lg px-4 py-2">
                <span class="flex-1 text-slate-700 dark:text-slate-200">{{ item }}</span>
                <button onclick="removeItem(this, 'buying')"
                    class="text-red-500 hover:text-red-700 text-xl">&times;</button>
            </div>
            {% endfor %}
        </div>
        <div class="mt-3 flex gap-2">
            <input type="text" id="newBuyingItem" placeholder="Add item..."
                class="flex-1 px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-700 dark:text-white focus:ring-2 focus:ring-primary outline-none">
            <button onclick="addItem('buying')"
                class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 transition">Add</button>
        </div>
    </div>

    <!-- Pantry/Ignore List -->
    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-md p-6">
        <h2 class="text-xl font-bold text-slate-800 dark:text-white mb-4">🚫 Items to Ignore / Already Have</h2>
        <div id="pantryList" class="space-y-2">
            {% for item in pantry %}
            <div class="list-item flex items-center gap-2 bg-slate-50 dark:bg-slate-700 rounded-lg px-4 py-2">
                <span class="flex-1 text-slate-700 dark:text-slate-200">{{ item }}</span>
                <button onclick="removeItem(this, 'pantry')"
                    class="text-red-500 hover:text-red-700 text-xl">&times;</button>
            </div>
            {% endfor %}
        </div>
        <div class="mt-3 flex gap-2">
            <input type="text" id="newPantryItem" placeholder="Add item..."
                class="flex-1 px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-700 dark:text-white focus:ring-2 focus:ring-primary outline-none">
            <button onclick="addItem('pantry')"
                class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 transition">Add</button>
        </div>
    </div>

    <!-- Save Button -->
    <div class="flex justify-center">
        <button onclick="saveAll()" id="saveBtn"
            class="px-8 py-3 bg-gradient-to-r from-primary to-accent text-white font-semibold rounded-xl shadow hover:shadow-lg transform hover:scale-105 transition">
            💾 Save Changes
        </button>
    </div>

    <!-- Status Message -->
    <div id="statusMsg" class="hidden text-center py-2 rounded-lg"></div>
</div>

<script>
    function getListItems(listId) {
        const container = document.getElementById(listId + 'List');
        const items = [];
        container.querySelectorAll('.list-item span').forEach(span => {
            items.push(span.textContent.trim());
        });
        return items;
    }

    function addItem(listType) {
        const inputId = listType === 'buying' ? 'newBuyingItem' : 'newPantryItem';
        const input = document.getElementById(inputId);
        const value = input.value.trim();

        if (!value) return;

        const container = document.getElementById(listType + 'List');
        const div = document.createElement('div');
        div.className = 'list-item flex items-center gap-2 bg-slate-50 dark:bg-slate-700 rounded-lg px-4 py-2';
        div.innerHTML = `
        <span class="flex-1 text-slate-700 dark:text-slate-200">${value}</span>
        <button onclick="removeItem(this, '${listType}')" class="text-red-500 hover:text-red-700 text-xl">&times;</button>
    `;
        container.appendChild(div);
        input.value = '';
        input.focus();
    }

    function removeItem(btn, listType) {
        btn.parentElement.remove();
    }

    function saveAll() {
        const btn = document.getElementById('saveBtn');
        const statusMsg = document.getElementById('statusMsg');

        btn.disabled = true;
        btn.innerHTML = '⏳ Saving...';

        const data = {
            buying: getListItems('buying'),
            pantry: getListItems('pantry')
        };

        fetch('/api/lists', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
            .then(res => res.json())
            .then(result => {
                statusMsg.className = 'text-center py-2 rounded-lg bg-green-100 dark:bg-green-900 text-green-700 dark:text-green-300';
                statusMsg.textContent = '✅ Saved successfully!';
                statusMsg.classList.remove('hidden');
                setTimeout(() => statusMsg.classList.add('hidden'), 3000);
            })
            .catch(err => {
                statusMsg.className = 'text-center py-2 rounded-lg bg-red-100 dark:bg-red-900 text-red-700 dark:text-red-300';
                statusMsg.textContent = '❌ Error saving: ' + err;
                statusMsg.classList.remove('hidden');
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerHTML = '💾 Save Changes';
            });
    }

    // Allow Enter key to add items
    document.getElementById('newBuyingItem').addEventListener('keypress', e => {
        if (e.key === 'Enter') addItem('buying');
    });
    document.getElementById('newPantryItem').addEventListener('keypress', e => {
        if (e.key === 'Enter') addItem('pantry');
    });
</script>
{% endblock %}
